    <style>

            --color-primary: #1565C0;
            --color-primary-dark: #0D47A1;
            --color-primary-light: #1E88E5;
            --color-success: #2ECC71;
            --color-warning: #F39C12;
            --color-danger: #E74C3C;
            --color-bg-light: #FFFFFF;
            --color-bg-light-secondary: #F8F9FA;
            --color-bg-dark: #0F0F0F;
            --color-bg-dark-secondary: #1A1A1A;
            --color-text-light: #1A1A1A;
            --color-text-light-secondary: #555555;
            --color-text-dark: #E8E8E8;
            --color-text-dark-secondary: #B0B0B0;
            --color-border-light: #E0E0E0;
            --color-border-dark: #333333;
            --spacing-xs: 0.5rem;

            --spacing-xl: 3rem;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-family-body); background-color: var(--color-bg-light); color: var(--color-text-light); line-height: 1.6; }
        body.dark-mode { background-color: var(--color-bg-dark); color: var(--color-text-dark); }

        header { position: fixed; top: 0; width: 100%; height: 80px; background-color: var(--color-bg-light); border-bottom: 1px solid var(--color-border-light); display: flex; justify-content: space-between; align-items: center; padding: 0 var(--spacing-lg); z-index: 1000; }
        body.dark-mode header { background-color: var(--color-bg-dark-secondary); border-bottom-color: var(--color-border-dark); }
        .navbar-logo { font-family: var(--font-family-display); font-size: 1.5rem; font-weight: 800; color: var(--color-primary); text-decoration: none; }
        .navbar-links { display: flex; gap: var(--spacing-xl); list-style: none; }
        .navbar-links a { text-decoration: none; color: var(--color-text-light); font-weight: 500; }
        body.dark-mode .navbar-links a { color: var(--color-text-dark); }

        body.dark-mode .language-toggle { background-color: var(--color-bg-dark); }
        .language-toggle button { background: none; border: none; padding: 0.4rem 0.8rem; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 0.85rem; color: var(--color-text-light-secondary); }
        body.dark-mode .language-toggle button { color: var(--color-text-dark-secondary); }
        .language-toggle button.active { background-color: var(--color-primary); color: white; }
        .theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.3rem; }
        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 5px; }
        .hamburger span { width: 25px; height: 3px; background-color: var(--color-text-light); border-radius: 2px; }
        body.dark-mode .hamburger span { background-color: var(--color-text-dark); }

        .container { display: grid; grid-template-columns: 280px 1fr; margin-top: 80px; min-height: calc(100vh - 80px); }
        .sidebar { background-color: var(--color-bg-light-secondary); border-right: 1px solid var(--color-border-light); padding: var(--spacing-lg); overflow-y: auto; position: sticky; top: 80px; height: calc(100vh - 80px); }
        body.dark-mode .sidebar { background-color: var(--color-bg-dark-secondary); border-right-color: var(--color-border-dark); }
        .sidebar h3 { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; color: var(--color-primary); margin: var(--spacing-lg) 0 var(--spacing-md); }
        .sidebar-item { padding: var(--spacing-sm); margin-bottom: 0.5rem; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; color: var(--color-text-light-secondary); text-decoration: none; display: block; font-size: 0.9rem; }
        body.dark-mode .sidebar-item { color: var(--color-text-dark-secondary); }
        .sidebar-item:hover { background-color: var(--color-bg-light); color: var(--color-primary); }
        body.dark-mode .sidebar-item:hover { background-color: var(--color-bg-dark); }
        .sidebar-item.active { background-color: var(--color-primary); color: white; }
        .sidebar-item.completed::after { content: ' ✓'; color: var(--color-success); font-weight: 700; }

        .progress-section { background-color: var(--color-bg-light); padding: var(--spacing-md); border-radius: 8px; margin-top: var(--spacing-lg); }
        body.dark-mode .progress-section { background-color: var(--color-bg-dark); }
        .progress-bar-vault { width: 100%; height: 8px; background-color: var(--color-border-light); border-radius: 4px; overflow: hidden; }
        body.dark-mode .progress-bar-vault { background-color: var(--color-border-dark); }
        .progress-fill { height: 100%; background: linear-gradient(to right, var(--color-primary), var(--color-primary-light)); transition: width 0.3s ease; }

        .main-content { padding: var(--spacing-xl); overflow-y: auto; }
        .gate-container { max-width: 700px; margin: 100px auto; text-align: center; }
        .gate-container h1 { font-size: 2.5rem; margin-bottom: var(--spacing-md); }
        .gate-container p { color: var(--color-text-light-secondary); margin-bottom: var(--spacing-lg); }
        body.dark-mode .gate-container p { color: var(--color-text-dark-secondary); }

        .code-input-section { background-color: var(--color-bg-light); padding: var(--spacing-xl); border-radius: 12px; border: 2px solid var(--color-border-light); margin-top: var(--spacing-xl); }
        body.dark-mode .code-input-section { background-color: var(--color-bg-dark-secondary); border-color: var(--color-border-dark); }
        .code-input { width: 100%; padding: 0.8rem; font-size: 1rem; border: 2px solid var(--color-border-light); border-radius: 8px; margin-bottom: var(--spacing-md); font-family: 'Courier New', monospace; text-transform: uppercase; }
        body.dark-mode .code-input { background-color: var(--color-bg-dark); color: var(--color-text-dark); border-color: var(--color-border-dark); }
        .code-error { background-color: rgba(231, 76, 60, 0.1); color: var(--color-danger); padding: var(--spacing-md); border-radius: 8px; margin-bottom: var(--spacing-md); display: none; }
        .code-error.show { display: block; }
        .code-submit { width: 100%; padding: 0.8rem; background-color: var(--color-primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .code-submit:hover { background-color: var(--color-primary-dark); }

        .chapter { display: none; }
        .chapter.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .chapter-header { margin-bottom: var(--spacing-xl); border-bottom: 2px solid var(--color-border-light); padding-bottom: var(--spacing-lg); }
        body.dark-mode .chapter-header { border-bottom-color: var(--color-border-dark); }
        .chapter-number { color: var(--color-primary); font-weight: 700; }
        .chapter-title { font-size: 2rem; font-weight: 800; margin: var(--spacing-md) 0; }
        .chapter-subtitle { color: var(--color-text-light-secondary); font-size: 1.1rem; }
        body.dark-mode .chapter-subtitle { color: var(--color-text-dark-secondary); }

        .chapter-content { max-width: 850px; }
        .chapter-content h3 { font-size: 1.5rem; margin: var(--spacing-xl) 0 var(--spacing-md); }
        .chapter-content h4 { font-size: 1.1rem; margin: var(--spacing-lg) 0 var(--spacing-sm); color: var(--color-primary); }
        .chapter-content p { margin-bottom: var(--spacing-md); color: var(--color-text-light-secondary); line-height: 1.8; }
        body.dark-mode .chapter-content p { color: var(--color-text-dark-secondary); }
        .chapter-content ul { margin-left: var(--spacing-lg); margin-bottom: var(--spacing-md); }
        .chapter-content li { margin-bottom: var(--spacing-sm); line-height: 1.8; }

        .callout { background-color: var(--color-bg-light-secondary); border-left: 4px solid var(--color-primary); padding: var(--spacing-lg); margin: var(--spacing-lg) 0; border-radius: 4px; }
        body.dark-mode .callout { background-color: var(--color-bg-dark); }
        .callout-title { font-weight: 700; color: var(--color-primary); margin-bottom: var(--spacing-sm); }
        .callout.warning { border-left-color: var(--color-warning); }
        .callout.warning .callout-title { color: var(--color-warning); }
        .callout.danger { border-left-color: var(--color-danger); }
        .callout.danger .callout-title { color: var(--color-danger); }

        .example-box { background-color: var(--color-bg-light); padding: var(--spacing-lg); border: 1px solid var(--color-border-light); border-radius: 8px; margin: var(--spacing-lg) 0; font-family: 'Courier New', monospace; font-size: 0.9rem; overflow-x: auto; }
        body.dark-mode .example-box { background-color: var(--color-bg-dark-secondary); border-color: var(--color-border-dark); }

        .quiz-section { background-color: var(--color-bg-light-secondary); padding: var(--spacing-xl); border-radius: 12px; margin: var(--spacing-xl) 0; }
        body.dark-mode .quiz-section { background-color: var(--color-bg-dark); }
        .quiz-section h3 { color: var(--color-primary); margin-bottom: var(--spacing-lg); }
        .quiz-question { margin-bottom: var(--spacing-lg); }
        .quiz-question-text { font-weight: 600; margin-bottom: var(--spacing-md); }
        .quiz-options { display: flex; flex-direction: column; gap: var(--spacing-sm); }
        .quiz-option { padding: var(--spacing-md); background-color: var(--color-bg-light); border: 2px solid var(--color-border-light); border-radius: 8px; cursor: pointer; transition: all 0.2s ease; }
        body.dark-mode .quiz-option { background-color: var(--color-bg-dark-secondary); border-color: var(--color-border-dark); }
        .quiz-option:hover { border-color: var(--color-primary); }
        .quiz-option.correct { background-color: rgba(46, 204, 113, 0.1); border-color: var(--color-success); }
        .quiz-option.incorrect { background-color: rgba(231, 76, 60, 0.1); border-color: var(--color-danger); }
        .quiz-feedback { margin-top: var(--spacing-md); padding: var(--spacing-md); border-radius: 8px; display: none; }
        .quiz-feedback.show { display: block; }
        .quiz-feedback.correct { background-color: rgba(46, 204, 113, 0.1); color: var(--color-success); }
        .quiz-feedback.incorrect { background-color: rgba(231, 76, 60, 0.1); color: var(--color-danger); }

        .simulator-section { background-color: var(--color-bg-light-secondary); padding: var(--spacing-xl); border-radius: 12px; margin: var(--spacing-xl) 0; }
        body.dark-mode .simulator-section { background-color: var(--color-bg-dark); }
        .simulator-section h3 { color: var(--color-primary); margin-bottom: var(--spacing-lg); }
        .simulator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg); }
        .simulator-inputs { display: flex; flex-direction: column; gap: var(--spacing-md); }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: 600; margin-bottom: var(--spacing-sm); }
        .input-group input, .input-group select { padding: 0.8rem; border: 2px solid var(--color-border-light); border-radius: 8px; font-size: 1rem; }
        body.dark-mode .input-group input, body.dark-mode .input-group select { background-color: var(--color-bg-dark-secondary); color: var(--color-text-dark); border-color: var(--color-border-dark); }
        .simulate-button { background-color: var(--color-primary); color: white; padding: 0.8rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .simulate-button:hover { background-color: var(--color-primary-dark); }
        .simulator-results { background-color: var(--color-bg-light); padding: var(--spacing-lg); border-radius: 8px; border-left: 4px solid var(--color-success); }
        body.dark-mode .simulator-results { background-color: var(--color-bg-dark-secondary); }
        .result-row { display: flex; justify-content: space-between; padding: var(--spacing-sm) 0; border-bottom: 1px solid var(--color-border-light); }
        body.dark-mode .result-row { border-bottom-color: var(--color-border-dark); }
        .result-label { font-weight: 600; }
        .result-value { color: var(--color-primary); font-weight: 700; }
        .chart-container { position: relative; height: 300px; margin-top: var(--spacing-lg); }

        .chapter-actions { display: flex; gap: var(--spacing-md); margin-top: var(--spacing-xl); border-top: 1px solid var(--color-border-light); padding-top: var(--spacing-lg); }
        body.dark-mode .chapter-actions { border-top-color: var(--color-border-dark); }
        .mark-read-button { background-color: var(--color-success); color: white; padding: 0.8rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .mark-read-button:hover { background-color: rgba(46, 204, 113, 0.8); }
        .mark-read-button.marked { opacity: 0.6; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { position: fixed; left: 0; top: 80px; width: 100%; height: auto; max-height: 300px; border-right: none; border-bottom: 1px solid var(--color-border-light); display: none; }
            .sidebar.mobile-open { display: block; }
            .main-content { padding: var(--spacing-lg); }
            .simulator-grid { grid-template-columns: 1fr; }
            .hamburger { display: flex; }
            .navbar-links { display: none; }
        }
    </style>
</head>

    <script>
        const VAULT_CODES = ['GV-SPRING-2026'];
        let currentLanguage = localStorage.getItem('genesis-language') || 'pt';
        let currentChapterIndex = 0;
        let isAuthenticated = !!sessionStorage.getItem('vault-auth');

        const chapters = [
            {
                id: 'cap1', type: 'base', number: 1,
                title: { pt: 'A Origem: Do Colapso ao Genesis Block', en: 'The Origin: From Collapse to Genesis Block' },
                subtitle: { pt: 'A história que precedeu Bitcoin', en: 'The history that preceded Bitcoin' },
                content: { pt: `
                    <h3>A Crise de 2008 e o Colapso</h3>
                    <p>Em setembro de 2008, Lehman Brothers colapsou. O sistema financeiro global entrou em pânico. Bancos desabaram. Poupanças evaporaram. Milhões perderam casas e empregos. Ninguém o vira vindo. Os "especialistas" não tinham ideia. Os mecanismos de segurança falharam completamente.</p>
                    <div class="callout warning">
                        <div class="callout-title">Por que importa?</div>
                        <p>Esta crise destruiu a confiança no sistema centralizado. Se as instituições que deveriam proteger o nosso dinheiro são as mesmas que o perdem, para que servem?</p>
                    </div>
                    <h3>Satoshi Nakamoto e a Visão Alternativa</h3>
                    <p>Em 31 de outubro de 2008, Satoshi Nakamoto publicou um documento de nove páginas: "Bitcoin: A Peer-to-Peer Electronic Cash System". O documento propunha algo radical: dinheiro digital que não precisaria de bancos, de intermediários, de ninguém que controlasse o sistema. Apenas código, criptografia e matemática.</p>
                    <div class="example-box">Abstract: "A purely peer-to-peer version of electronic cash would allow online payments to be sent directly from one party to another without going through a financial institution."</div>
                    <h3>O Genesis Block — Janeiro de 2009</h3>
                    <p>A 3 de janeiro de 2009, o software Bitcoin foi ativado. A primeira transação (chamada de "Genesis Block") foi minerada. Nesse bloco, Satoshi incluiu uma mensagem:</p>
                    <div class="example-box">"The Times 03/Jan/2009 Chancellor on brink of second bailout for banks"</div>
                    <p>Uma referência direta ao jornal The Times de 3 de janeiro de 2009. Uma mensagem clara: o sistema precisava mudar.</p>
                    <h3>Os Pilares da Revolução</h3>
                    <p>Bitcoin foi construído sobre três pilares fundamentais:</p>
                    <ul>
                        <li><strong>Descentralização:</strong> Sem um servidor central. Milhares de nós. Cada um com cópia completa da história.</li>
                        <li><strong>Transparência:</strong> Todas as transações são visíveis. Ninguém pode falsificar registos. Tudo é verificável.</li>
                        <li><strong>Sem Permissão:</strong> Qualquer pessoa, em qualquer lugar, a qualquer hora, pode participar. Não precisa de aprovação.</li>
                    </ul>
                    <div class="callout">
                        <div class="callout-title">Nota Importante</div>
                        <p>Bitcoin não foi a primeira tentativa de moeda digital. Houve várias antes. O que a torna diferente é que resolveu o "double-spending problem" — garantir que a mesma moeda digital não é gasta duas vezes — sem precisar de um intermediário.</p>
                    </div>
                    <h3>Do Genesis ao Hoje</h3>
                    <p>Desde 2009, o Bitcoin subiu de centavos para milhares de euros. Passou de um experimento técnico para uma classe de ativos de trilhões de dólares.</p>
                    <p>Após o seu sucesso, surgiram centenas de criptoativos: Ethereum (com smart contracts), Solana (mais rápido), Polkadot (interoperabilidade), e muitos outros.</p>
                    <h3>O Teu Genesis</h3>
                    <p>Aqui estás tu, 15+ anos depois. Estás a explorar um ecossistema que foi nascido da desconfiança no sistema tradicional. Este capítulo é o teu Genesis Block. O teu ponto de partida. De agora em diante, construímos conhecimento sobre fundações sólidas.</p>
                `, en: `
                    <h3>The 2008 Crisis</h3>
                    <p>In September 2008, Lehman Brothers collapsed. The global financial system panicked. Banks crumbled. Savings evaporated. Millions lost homes and jobs.</p>
                    <p>No one saw it coming. The "experts" had no idea. Safety mechanisms failed completely.</p>
                    <div class="callout warning">
                        <div class="callout-title">Why does this matter?</div>
                        <p>This crisis destroyed confidence in the centralized system. If the institutions that should protect our money are the same ones that lose it, what are they for?</p>
                    </div>
                    <h3>Satoshi Nakamoto and the Alternative Vision</h3>
                    <p>On October 31, 2008, Satoshi Nakamoto published a nine-page document: "Bitcoin: A Peer-to-Peer Electronic Cash System".</p>
                    <p>The document proposed something radical: digital money that would not need banks, intermediaries, or anyone controlling the system. Just code, cryptography and mathematics.</p>
                ` }
            },
            {
                id: 'cap2', type: 'base', number: 2,
                title: { pt: 'Blockchain, Mineração e Consenso', en: 'Blockchain, Mining and Consensus' },
                subtitle: { pt: 'Como funciona a tecnologia', en: 'How the technology works' },
                content: { pt: `
                    <h3>O que é a Blockchain?</h3>
                    <p>Blockchain é, em essência, uma lista de blocos. Cada bloco contém dados (transações) e uma referência criptográfica (um hash) para o bloco anterior. É como uma corrente de blocos conectados.</p>
                    <div class="example-box">Bloco 1: [Dados] → Hash ABC123<br>Bloco 2: [Dados] + Hash ABC123 → Hash DEF456<br>Bloco 3: [Dados] + Hash DEF456 → Hash GHI789</div>
                    <h3>As Quatro Propriedades Essenciais</h3>
                    <ul>
                        <li><strong>Imutabilidade:</strong> Se alguém tenta mudar um dado no Bloco 2, o seu hash muda. Mas o Bloco 3 ainda referencia o hash anterior. A mudança é imediatamente detetada. Qualquer alteração passada quebra a corrente inteira.</li>
                        <li><strong>Descentralização:</strong> Não há um único servidor. Há milhares. Cada um tem uma cópia completa. Para alterar a história, terias de alterar a maioria simultaneamente — praticamente impossível.</li>
                        <li><strong>Transparência:</strong> Qualquer um pode ver toda a história da blockchain. Todas as transações estão lá. Não há segredos técnicos, apenas criptografia pública.</li>
                        <li><strong>Sem Permissão:</strong> Qualquer um pode juntar-se à rede e começar a validar transações. Não precisa de pedir permissão a ninguém.</li>
                    </ul>
                    <div class="callout">
                        <div class="callout-title">Analogia do Mundo Real</div>
                        <p>Imagina um caderno que é partilhado por 10.000 pessoas. Qualquer transação é anotada no caderno e distribuída a todas. Se uma pessoa tenta falsificar uma transação anterior, as outras 9.999 dizem "não, isso não corresponde ao nosso registo". É impossível falsificar.</p>
                    </div>
                    <h3>Mineração — Como Novos Blocos são Criados</h3>
                    <p>A mineração é o processo de validação e adição de novos blocos à blockchain. Quando alguém faz uma transação Bitcoin, ela entra num "mempool" — uma fila de transações à espera de validação. Os mineradores competem para resolver um quebra-cabeça matemático complexo. O primeiro a resolvê-lo ganha o direito de adicionar o novo bloco (com as transações) à blockchain.</p>
                    <p>Esse minerador recebe uma recompensa: uma quantidade de Bitcoin novo ("block reward") + as taxas das transações que incluiu.</p>
                    <div class="example-box">Exemplo: 10 transações aguardam validação. 5 mineradores estão a competir. Minerador A resolve o puzzle primeiro. Block reward: 6.25 BTC (em 2024). Taxas: 0.05 BTC. Total ganho: 6.30 BTC.</div>
                    <h3>Prova de Trabalho (PoW) vs Prova de Participação (PoS)</h3>
                    <p><strong>Prova de Trabalho (PoW):</strong> Como Bitcoin. Mineradores usam potência computacional massiva para resolver puzzles. É seguro mas consome muita energia.</p>
                    <p><strong>Prova de Participação (PoS):</strong> Novo modelo. Em vez de computação, os validadores "apostam" moedas próprias. Se forem honestos, ganham recompensa. Se tentarem fraudar, perdem as moedas ("slashing"). Ethereum mudou para PoS em 2022.</p>
                    <h3>Smart Contracts</h3>
                    <p>Bitcoin pode apenas registar transações. Ethereum (2015) adicionou "smart contracts" — programas que vivem na blockchain e executam automaticamente quando certas condições são cumpridas.</p>
                    <p>Exemplo: "Se o preço da BTC subir acima de €50.000, transfere 1 ETH da carteira A para a carteira B".</p>
                    <p>Os smart contracts são "imutáveis" — uma vez publicados, não podem ser alterados ou cancelados. Executam-se exatamente como foram programados.</p>
                `, en: `
                    <h3>What is Blockchain?</h3>
                    <p>Blockchain is, essentially, a list of blocks. Each block contains data (transactions) and a cryptographic reference (a hash) to the previous block.</p>
                ` }

                content: { pt: `
                    <h3>O que é uma Wallet?</h3>
                    <p>Uma wallet é simplesmente um par de chaves criptográficas: uma pública (como um IBAN) e uma privada (como a password do teu banco, mas muito mais crítica).</p>
                    <p><strong>Chave Pública:</strong> Pode ser partilhada livremente. Qualquer um pode enviar-te moedas usando a tua chave pública.</p>
                    <p><strong>Chave Privada:</strong> NUNCA a partilhes. Quem tem a chave privada controla os fundos. Se a perdes, perdes o acesso às moedas para sempre.</p>
                    <div class="callout danger">
                        <div class="callout-title">Regra Absoluta #1: Guarda a Chave Privada</div>
                        <p>Se alguém tem a tua chave privada, pode enviar todas as tuas moedas para qualquer lugar e tu não podes fazer nada. Não há "guardarroupa", não há "esqueci a password". Desaparece.</p>
                    </div>
                    <h3>Tipos de Wallets</h3>
                    <p><strong>Custodial (Centralizado):</strong> Uma exchange (como Kraken, Binance) guarda a tua moeda e a chave privada. Tu tens um login/password, mas a exchange controla tecnicamente os fundos. Se a exchange é hackeada ou falha, podes perder tudo.</p>
                    <p><strong>Non-Custodial (Descentralizado):</strong> Tu guardas a chave privada. Tu és o banco. Exemplos: hardware wallets (Ledger, Trezor), software wallets (MetaMask), paper wallets.</p>
                    <div class="example-box">Exemplo de Seed Phrase (12 palavras): "abandon ability able about above absent absorb abstract abstain accent accept access". Esta frase gera todas as chaves da tua wallet. NUNCA a parta com ninguém.</div>
                    <h3>A Seed Phrase — A Tua Chave Mestra</h3>
                    <p>A maioria das wallets modernas usam uma "seed phrase" — uma sequência de 12 ou 24 palavras que geram todas as chaves privadas. Se conseguires a seed phrase, consegues a wallet inteira.</p>
                    <p>Se perdes a seed phrase e o teu dispositivo é roubado/destruído, perdeste acesso aos fundos permanentemente.</p>
                    <h3>Exchanges — Os Portais de Entrada</h3>
                    <p>Uma exchange é uma plataforma onde podes comprar, vender e trocar moedas. Exemplos: Kraken, Binance, Coinbase. Vantagem: Fácil de usar, interface simples, podes usar cartão de crédito. Desvantagem: A exchange é custodial — eles guardam as chaves.</p>
                    <h3>A Importância de Retirar da Exchange</h3>
                    <p>Muitas pessoas deixam moedas nas exchanges indefinidamente. Isto é arriscado. Se queres armazenamento de longo prazo, deverias retirar para a tua própria wallet.</p>
                    <p><strong>"Not your keys, not your coins"</strong> — Se não tens a chave privada, tecnicamente não é teu.</p>
                    <h3>Golpes e Ataques Comuns</h3>
                    <ul>
                        <li><strong>Phishing:</strong> Site fake que parece real. Colocar a seed phrase lá "recupera" a wallet. Na verdade, está a roubar.</li>
                        <li><strong>Malware:</strong> Virus que registam teclado ou screenshot quando compias a seed phrase.</li>
                        <li><strong>Confiança Falsa:</strong> "Influenciador" oferece giveaway. Se enviares €100 primeiro, recebes €1000 em BTC. Obviamente, é scam.</li>
                    </ul>
                `, en: `
                    <h3>What is a Wallet?</h3>
                    <p>A wallet is simply a pair of cryptographic keys: one public (like an IBAN) and one private (like your bank password, but much more critical).</p>
                ` }

                    <h3>Análise Técnica vs Fundamentos</h3>
                    <p><strong>Técnica:</strong> Olhas para gráficos, padrões, volume. A premissa é que o preço reflete toda a informação, e padrões históricos repetem-se.</p>
                    <p><strong>Fundamental:</strong> Estudas a tecnologia, adoção, notícias. "É este ativo realmente valioso?"</p>
                    <p>O ideal é combinar ambas.</p>
                    <h3>Indicadores Técnicos Essenciais</h3>
                    <p><strong>RSI (Relative Strength Index):</strong> Mede a força do movimento. Entre 0 e 100. Acima de 70 = "sobrecomprado" (pode cair). Abaixo de 30 = "sobrevendido" (pode subir).</p>
                    <p><strong>MACD (Moving Average Convergence Divergence):</strong> Mostra momentum. Quando a linha rápida cruza a linha lenta = mudança de direção possível.</p>
                    <p><strong>Médias Móveis:</strong> Média do preço dos últimos X dias. Suaviza a volatilidade. Se o preço está acima da média móvel de 200 dias = tendência de alta.</p>
                    <p><strong>Volume:</strong> Quantas moedas foram transacionadas. Volume alto = movimento forte (confirmado). Volume baixo = movimento fraco (falso).</p>
                    <div class="callout">
                        <div class="callout-title">Nota Sobre Indicadores</div>
                        <p>Indicadores são "lagging" — dizem-te o que já aconteceu, não o que vai acontecer. Não são cristais. São ferramentas de contexto.</p>
                    </div>
                    <h3>Ciclos de Mercado</h3>
                    <p>O mercado crypto é cíclico. Segue um padrão:</p>
                    <ol>
                        <li><strong>Acumulação:</strong> Preço baixo, interesse baixo. Pessoas conscientes entram silenciosamente.</li>
                        <li><strong>Markup:</strong> Preço sobe. Mais pessoas percebem e entram.</li>
                        <li><strong>Distribuição:</strong> Preço alcança picos. Ganancioso. Todos falam sobre crypto. Influenciadores fazem "calls". Pessoas entram no topo.</li>
                        <li><strong>Markdown:</strong> Preço cai brutalmente. Pânico. Pessoas vendem tudo. Saem frustradas.</li>
                        <li>Volta ao passo 1.</li>
                    </ol>
                    <p>Bitcoin tem "halving" a cada 4 anos. Isto tende a criar ciclos de ~4 anos também.</p>
                    <h3>Eventos Macro Que Afetam Crypto</h3>
                    <p><strong>Taxas de Juro:</strong> Se o Banco Central aumenta taxas, menos pessoas especulam em crypto. Se baixa, mais especulação.</p>
                    <p><strong>Inflação:</strong> Alta inflação torna crypto apelativo (ouro digital). Mas também torna tudo volátil.</p>
                    <p><strong>Notícias Regulatórias:</strong> Se um país bane crypto, preço cai. Se outro o aceita, sobe.</p>
                    <p><strong>Adoção Institucional:</strong> Quando grandes fundos entram, mercado sobe.</p>
                `, en: `
                    <h3>Technical Analysis vs Fundamentals</h3>
                    <p><strong>Technical:</strong> You look at charts, patterns, volume.</p>
                ` }

            { pt: 'Qual é a propriedade-chave da blockchain?', en: 'What is the key property of blockchain?', options: [{ pt: 'Velocidade máxima', en: 'Maximum speed' }, { pt: 'Imutabilidade', en: 'Immutability' }, { pt: 'Centralização', en: 'Centralization' }, { pt: 'Fácil reversão', en: 'Easy reversal' }], correct: 1 },

        ]
    };

    // Renderizar sidebar
    function renderSidebar() {
        const baseHtml = chapters.filter(c => c.type === 'base').map(c => 
            `<div class="sidebar-item" data-chapter="${c.id}" onclick="loadChapter('${c.id}')">Cap ${c.number}</div>`
        ).join('');
        const advHtml = chapters.filter(c => c.type === 'advanced').map(c => 
            `<div class="sidebar-item" data-chapter="${c.id}" onclick="loadChapter('${c.id}')">Mod ${c.number - 8}</div>`
        ).join('');
        
        document.getElementById('sidebar-base').innerHTML = baseHtml;
        document.getElementById('sidebar-advanced').innerHTML = advHtml;
        document.getElementById('progress-total').textContent = chapters.length;
    }

    // Carregar capítulo
    function loadChapter(chapterId) {
        const chapter = chapters.find(c => c.id === chapterId);
        if (!chapter) return;

        currentChapterIndex = chapters.indexOf(chapter);
        const content = chapter.content[currentLanguage] || chapter.content.pt;

        let html = `
            <div class="chapter-header">
                <div class="chapter-number">${chapter.type === 'base' ? 'CAPÍTULO' : 'MÓDULO'} ${chapter.number}</div>
                <h1 class="chapter-title">${chapter.title[currentLanguage] || chapter.title.pt}</h1>
                <p class="chapter-subtitle">${chapter.subtitle[currentLanguage] || chapter.subtitle.pt}</p>
            </div>

            <div class="chapter-content">${content}</div>
        `;

        // Quizzes
        if (quizzes[chapterId]) {
            html += `<div class="quiz-section">
                <h3>${currentLanguage === 'pt' ? 'Quiz de Validação' : 'Validation Quiz'}</h3>
                ${quizzes[chapterId].map((q, i) => `
                    <div class="quiz-question">
                        <div class="quiz-question-text">${q[currentLanguage] || q.pt}</div>
                        <div class="quiz-options">
                            ${q.options.map((opt, j) => `
                                <button class="quiz-option" onclick="checkAnswer(${chapterId.charCodeAt(0)}, ${i}, ${j})">${opt[currentLanguage] || opt.pt}</button>
                            `).join('')}
                        </div>
                        <div class="quiz-feedback" id="feedback-${i}"></div>
                    </div>
                `).join('')}
            </div>`;
        }

        html += `<div class="chapter-actions">
            <button class="mark-read-button" onclick="markChapterRead('${chapterId}')">${currentLanguage === 'pt' ? 'Marcar como Lido' : 'Mark as Read'}</button>
        </div>`;

        document.getElementById('course-content').innerHTML = html;
        updateSidebarActive(chapterId);
        window.scrollTo(0, 0);
    }

    function updateSidebarActive(chapterId) {
        document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`[data-chapter="${chapterId}"]`)?.classList.add('active');
    }

    function markChapterRead(chapterId) {
        const item = document.querySelector(`[data-chapter="${chapterId}"]`);
        if (!item.classList.contains('completed')) {
            item.classList.add('completed');
            updateProgress();
        }
    }

    function updateProgress() {
        const completed = document.querySelectorAll('.sidebar-item.completed').length;
        const total = chapters.length;
        document.getElementById('progress-fill').style.width = (completed / total) * 100 + '%';
        document.getElementById('progress-count').textContent = completed;
    }

    function checkAnswer(chapterNum, questionIdx, answerIdx) {
        // Implementação simplificada
        const isCorrect = answerIdx === 1; // Apenas para demo
        const feedback = document.getElementById(`feedback-${questionIdx}`);
        feedback.textContent = isCorrect ? 'Correto! ✓' : 'Incorreto. Tenta novamente.';
        feedback.className = `quiz-feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
    }

    function runDCASimulator() {
        const monthly = parseFloat(document.getElementById('dca-monthly').value) || 100;
        const years = parseInt(document.getElementById('dca-years').value) || 5;
        const rate = parseFloat(document.getElementById('dca-rate').value) / 100 / 12 || 0.15 / 12;

        let value = 0;
        const data = { labels: [], values: [] };

        for (let i = 0; i < years * 12; i++) {
            value = (value + monthly) * (1 + rate);
            if (i % 3 === 0) {
                data.labels.push(`Mês ${i}`);
                data.values.push(Math.round(value));
            }
        }

        const invested = monthly * years * 12;
        document.getElementById('dca-invested').textContent = '€' + invested.toFixed(2);
        document.getElementById('dca-value').textContent = '€' + Math.round(value).toFixed(2);
        document.getElementById('dca-profit').textContent = '€' + (value - invested).toFixed(2);
        document.getElementById('dca-results').style.display = 'block';

        // Desenhar gráfico
        const ctx = document.getElementById('dca-chart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.labels,
                datasets: [{
                    label: 'DCA Growth',
                    data: data.values,
                    borderColor: '#1565C0',
                    backgroundColor: 'rgba(21, 101, 192, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { callback: v => '€' + v }
                    }
                }
            }
        });
    }

    function runTaxCalculator() {
        const buy = parseFloat(document.getElementById('tax-buy').value) || 10000;
        const sell = parseFloat(document.getElementById('tax-sell').value) || 15000;
        const days = parseInt(document.getElementById('tax-days').value) || 200;
        const rate = parseFloat(document.getElementById('tax-rate').value) / 100 || 0.285;

        const gain = sell - buy;
        const isExempt = days >= 365;
        const irs = isExempt ? 0 : gain * rate;
        const net = sell - irs;

        document.getElementById('tax-gain').textContent = '€' + gain.toFixed(2);
        document.getElementById('tax-irs').textContent = '€' + irs.toFixed(2) + (isExempt ? ' (isento)' : '');
        document.getElementById('tax-net').textContent = '€' + net.toFixed(2);
        document.getElementById('tax-results').style.display = 'block';
    }

    function compareAssets() {
        const asset1 = document.getElementById('asset1').value;
        const asset2 = document.getElementById('asset2').value;

        const assetData = {
            'BTC': { price: '€42,500', vol: 'Baixa', risk: 'Médio' },
            'ETH': { price: '€2,200', vol: 'Média', risk: 'Médio-Alto' },
            'SOL': { price: '€145', vol: 'Alta', risk: 'Alto' },
            'ADA': { price: '€1.50', vol: 'Alta', risk: 'Muito Alto' },
            'XRP': { price: '€0.95', vol: 'Média', risk: 'Alto' }
        };

        document.getElementById('comp-asset1').textContent = asset1;
        document.getElementById('comp-asset2').textContent = asset2;
        document.getElementById('comp-price1').textContent = assetData[asset1]?.price || '-';
        document.getElementById('comp-price2').textContent = assetData[asset2]?.price || '-';
        document.getElementById('comp-vol1').textContent = assetData[asset1]?.vol || '-';
        document.getElementById('comp-vol2').textContent = assetData[asset2]?.vol || '-';
        document.getElementById('comp-risk1').textContent = assetData[asset1]?.risk || '-';
        document.getElementById('comp-risk2').textContent = assetData[asset2]?.risk || '-';
        document.getElementById('comparison-results').style.display = 'block';
    }

    // Validar código
    document.querySelector('.code-submit').addEventListener('click', function() {
        const code = document.getElementById('vault-code').value.toUpperCase();
        const errorDiv = document.getElementById('code-error');

        if (VAULT_CODES.includes(code)) {
            sessionStorage.setItem('vault-auth', 'true');
            isAuthenticated = true;
            document.getElementById('gate').style.display = 'none';
            document.getElementById('course-content').style.display = 'block';
            renderSidebar();
            loadChapter('cap1');
            errorDiv.classList.remove('show');
        } else {
            errorDiv.textContent = 'Código inválido. Tenta novamente.';
            errorDiv.classList.add('show');
        }
    });

    // Tema
    document.querySelector('.theme-toggle').addEventListener('click', function() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('genesis-theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        this.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    });

    // Idioma
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            currentLanguage = this.dataset.lang;
            localStorage.setItem('genesis-language', currentLanguage);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            if (currentChapterIndex > 0) {
                loadChapter(chapters[currentChapterIndex].id);
            }
        });
    });

    // Carregar tema e idioma salvos
    if (localStorage.getItem('genesis-theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.querySelector('.theme-toggle').textContent = '☀️';
    }

    // Verificar autenticação ao carregar
    if (isAuthenticated) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('course-content').style.display = 'block';
        renderSidebar();
        loadChapter('cap1');
    }
</script>
