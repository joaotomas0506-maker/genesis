            --color-bg-dark: #0F0F0F;
            --color-bg-dark-secondary: #1A1A1A;
            --color-text-light: #1A1A1A;
            --color-text-light-secondary: #555555;
            --color-text-dark: #E8E8E8;

        .navbar-logo { 
            font-family: var(--font-family-display);

        body.dark-mode .navbar-links a { color: var(--color-text-dark); }
        .navbar-links a:hover { color: var(--color-primary); }
        
        .navbar-controls { display: flex; gap: var(--spacing-md); align-items: center; }
        .language-toggle { display: flex; gap: 0.5rem; background-color: var(--color-bg-light-secondary); padding: 0.4rem; border-radius: 8px; border: none; }

        body.dark-mode .language-toggle button { color: var(--color-text-dark-secondary); }
        .language-toggle button.active { background-color: var(--color-primary); color: white; }
        .theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.3rem; }
        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 5px; }
        .hamburger span { width: 25px; height: 3px; background-color: var(--color-text-light); border-radius: 2px; }
        body.dark-mode .hamburger span { background-color: var(--color-text-dark); }

        .main-content { max-width: 1200px; margin: 0 auto; padding: var(--spacing-xl) var(--spacing-lg); margin-top: 80px; }

        .gate-container p { color: var(--color-text-light-secondary); margin-bottom: var(--spacing-lg); }
        body.dark-mode .gate-container p { color: var(--color-text-dark-secondary); }

        .code-input-section { background-color: var(--color-bg-light); padding: var(--spacing-xl); border-radius: 12px; border: 2px solid var(--color-border-light); margin-top: var(--spacing-xl); }
        body.dark-mode .code-input-section { background-color: var(--color-bg-dark-secondary); border-color: var(--color-border-dark); }
        .code-input { width: 100%; padding: 0.8rem; font-size: 1rem; border: 2px solid var(--color-border-light); border-radius: 8px; margin-bottom: var(--spacing-md); font-family: 'Courier New', monospace; text-transform: uppercase; }

        .code-submit:hover { background-color: var(--color-primary-dark); }

        .course-container { display: none; }
        .course-container.active { display: flex; gap: var(--spacing-lg); }

        .sidebar { width: 280px; background-color: var(--color-bg-light); border: 1px solid var(--color-border-light); border-radius: 12px; padding: var(--spacing-lg); max-height: 80vh; overflow-y: auto; position: sticky; top: 100px; }

        body.dark-mode .sidebar-chapter:hover { background-color: var(--color-bg-dark); }
        .sidebar-chapter.active { background-color: var(--color-primary); color: white; font-weight: 600; }

        .course-content { flex: 1; }
        .chapter-header { background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light)); color: white; padding: var(--spacing-xl); border-radius: 12px; margin-bottom: var(--spacing-xl); }
        .chapter-number { font-size: 0.9rem; opacity: 0.9; }
        .chapter-title { font-size: 2rem; font-weight: 800; margin: var(--spacing-md) 0; }

        .chapter-body { background-color: var(--color-bg-light); border: 1px solid var(--color-border-light); border-radius: 12px; padding: var(--spacing-xl); }
        body.dark-mode .chapter-body { background-color: var(--color-bg-dark-secondary); border-color: var(--color-border-dark); }

        .example-box { background-color: var(--color-bg-light-secondary); padding: var(--spacing-lg); border-radius: 8px; border-left: 4px solid var(--color-primary); margin: var(--spacing-md) 0; }
        body.dark-mode .example-box { background-color: var(--color-bg-dark); }

        .callout { padding: var(--spacing-lg); border-radius: 8px; margin: var(--spacing-md) 0; border-left: 4px solid; }
        .callout.warning { background-color: rgba(243, 156, 18, 0.1); border-left-color: var(--color-warning); }
        .callout.success { background-color: rgba(46, 204, 113, 0.1); border-left-color: var(--color-success); }
        .callout-title { font-weight: 700; margin-bottom: var(--spacing-sm); }

        .quiz-option { background-color: white; padding: var(--spacing-md); border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer; border: 2px solid transparent; }

        .progress-bar { width: 100%; height: 8px; background-color: var(--color-border-light); border-radius: 4px; overflow: hidden; margin-top: var(--spacing-sm); }
        body.dark-mode .progress-bar { background-color: var(--color-border-dark); }
        .progress-fill { height: 100%; background-color: var(--color-success); transition: width 0.3s; }

        .nav-buttons { display: flex; gap: var(--spacing-md); margin-top: var(--spacing-xl); }
        .nav-buttons button { flex: 1; padding: 0.8rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .nav-prev { background-color: var(--color-bg-light-secondary); color: var(--color-text-light); }
        body.dark-mode .nav-prev { background-color: var(--color-bg-dark); color: var(--color-text-dark); }
        .nav-next { background-color: var(--color-primary); color: white; }
        .nav-next:hover { background-color: var(--color-primary-dark); }

        @media (max-width: 768px) {
            .navbar-links { display: none; }
            .hamburger { display: flex; }
            .course-container.active { flex-direction: column; }
            .sidebar { width: 100%; max-height: none; position: static; }
        }
    </style>

    <script>
        // CÓDIGOS ATUALIZADOS — SUBSTITUI AQUI
        const VAULT_CODES = ['GV-SPRING-2026', 'GV-K9M2-2026', 'GV-P7X4-2026', 'GV-R5L8-2026', 'GV-ADMIN-2026'];

        const chapters = [
            // CAPÍTULOS BÁSICOS
            {
                id: 'cap1', type: 'basic', number: 1,
                title: { pt: 'O Que É Bitcoin?', en: 'What is Bitcoin?' },
                subtitle: { pt: 'Entender a base', en: 'Understanding the basics' },
                content: { pt: '<h3>Bitcoin 101</h3><p>Bitcoin é a primeira criptomoeda descentralizada, criada em 2009 por uma pessoa (ou grupo) sob pseudónimo Satoshi Nakamoto. É baseado em blockchain.</p><div class="example-box"><strong>Analogia simples:</strong> Bitcoin é como dinheiro digital que não precisa de banco. Tu és o teu próprio banco.</div>', en: '<h3>Bitcoin 101</h3><p>Bitcoin is the first decentralized cryptocurrency, created in 2009 by a person (or group) under the pseudonym Satoshi Nakamoto. It is based on blockchain.</p><div class="example-box"><strong>Simple analogy:</strong> Bitcoin is like digital money that doesn\'t need a bank. You are your own bank.</div>' }
            },
            {
                id: 'cap2', type: 'basic', number: 2,
                title: { pt: 'Blockchain: A Tecnologia Base', en: 'Blockchain: The Base Technology' },
                subtitle: { pt: 'Como funciona', en: 'How it works' },
                content: { pt: '<h3>Entender Blockchain</h3><p>Blockchain é um livro-razão distribuído. Imagina um Excel que é partilhado por milhares de computadores. Ninguém consegue trapacear porque todos têm a mesma cópia.</p><div class="callout warning"><div class="callout-title">⚠ Importante:</div><p>Cada bloco contém uma assinatura única (hash). Se alguém tenta mudar um bloco, o hash muda e todos veem a fraude.</p></div>', en: '<h3>Understanding Blockchain</h3><p>Blockchain is a distributed ledger. Imagine an Excel sheet that is shared by thousands of computers. No one can cheat because everyone has the same copy.</p><div class="callout warning"><div class="callout-title">⚠ Important:</div><p>Each block contains a unique signature (hash). If someone tries to change a block, the hash changes and everyone sees the fraud.</p></div>' }
            },
            {
                id: 'cap3', type: 'basic', number: 3,
                title: { pt: 'Carteiras e Segurança', en: 'Wallets and Security' },
                subtitle: { pt: 'Como guardar crypto', en: 'How to store crypto' },
                content: { pt: '<h3>Tipos de Carteiras</h3><p><strong>1. Hot Wallet (Online):</strong> Rápido, fácil, menos seguro. Exemplo: MetaMask, Trust Wallet.</p><p><strong>2. Cold Wallet (Offline):</strong> Muito seguro, mais lento. Exemplo: Ledger, Trezor.</p><div class="callout success"><div class="callout-title">✓ Melhor Prática:</div><p>Para grandes quantidades: cold wallet. Para trading: hot wallet com pequenas quantidades.</p></div>', en: '<h3>Wallet Types</h3><p><strong>1. Hot Wallet (Online):</strong> Fast, easy, less secure. Example: MetaMask, Trust Wallet.</p><p><strong>2. Cold Wallet (Offline):</strong> Very secure, slower. Example: Ledger, Trezor.</p><div class="callout success"><div class="callout-title">✓ Best Practice:</div><p>For large amounts: cold wallet. For trading: hot wallet with small amounts.</p></div>' }
            },
            {
                id: 'cap4', type: 'basic', number: 4,
                title: { pt: 'Análise Técnica Básica', en: 'Basic Technical Analysis' },
                subtitle: { pt: 'Ler gráficos', en: 'Reading charts' },
                content: { pt: '<h3>Os 3 Indicadores Essenciais</h3><p><strong>1. Médias Móveis (MM):</strong> Mostram a tendência geral.</p><p><strong>2. RSI (Relative Strength Index):</strong> Mostra se está overbought (>70) ou oversold (<30).</p><p><strong>3. MACD:</strong> Identifica momentum e reversões.</p><div class="example-box">Regra de Ouro: Não trades contra a MM200. Se a MM200 é ascendente, tudo tende a subir.</div>', en: '<h3>The 3 Essential Indicators</h3><p><strong>1. Moving Averages (MA):</strong> Show the overall trend.</p><p><strong>2. RSI (Relative Strength Index):</strong> Shows if overbought (>70) or oversold (<30).</p><p><strong>3. MACD:</strong> Identifies momentum and reversals.</p><div class="example-box">Golden Rule: Don\'t trade against the 200 MA. If the 200 MA is upward, everything tends to go up.</div>' }
            },
            {
                id: 'cap5', type: 'basic', number: 5,
                title: { pt: 'Gestão de Risco', en: 'Risk Management' },
                subtitle: { pt: 'Não perder dinheiro', en: 'Not losing money' },
                content: { pt: '<h3>As 3 Regras de Ouro</h3><p><strong>1. Posição máxima 5% do portfolio:</strong> Se tens €1000, não metes mais de €50 numa posição.</p><p><strong>2. Stop-loss obrigatório:</strong> Define sempre uma perda máxima (ex: -10%).</p><p><strong>3. Risk/Reward 1:3:</strong> Só trades se ganhos potenciais são 3x maiores que perdas.</p><div class="callout warning"><div class="callout-title">⚠ Risco Real:</div><p>80% dos traders perdem dinheiro porque não respeitam estas regras.</p></div>', en: '<h3>The 3 Golden Rules</h3><p><strong>1. Maximum position 5% of portfolio:</strong> If you have €1000, don\'t put more than €50 in one position.</p><p><strong>2. Mandatory stop-loss:</strong> Always define a maximum loss (e.g., -10%).</p><p><strong>3. Risk/Reward 1:3:</strong> Only trade if potential gains are 3x larger than losses.</p><div class="callout warning"><div class="callout-title">⚠ Real Risk:</div><p>80% of traders lose money because they don\'t follow these rules.</p></div>' }
            },
            {
                id: 'cap6', type: 'basic', number: 6,
                title: { pt: 'Altcoins: Oportunidades e Riscos', en: 'Altcoins: Opportunities and Risks' },
                subtitle: { pt: 'Além de Bitcoin', en: 'Beyond Bitcoin' },
                content: { pt: '<h3>O Que é Altcoin?</h3><p>Qualquer criptomoeda que não seja Bitcoin. Exemplos: Ethereum, Solana, Cardano.</p><p><strong>Oportunidades:</strong> Potencial de 100x-1000x.</p><p><strong>Riscos:</strong> 99% das altcoins desaparecem.</p><div class="callout warning"><div class="callout-title">⚠ Aviso:</div><p>Não invistas em altcoins desconhecidas. Pesquisa whitepaper, team, roadmap.</p></div>', en: '<h3>What is Altcoin?</h3><p>Any cryptocurrency that isn\'t Bitcoin. Examples: Ethereum, Solana, Cardano.</p><p><strong>Opportunities:</strong> Potential for 100x-1000x returns.</p><p><strong>Risks:</strong> 99% of altcoins disappear.</p><div class="callout warning"><div class="callout-title">⚠ Warning:</div><p>Don\'t invest in unknown altcoins. Research whitepaper, team, roadmap.</p></div>' }
            },
            {
                id: 'cap7', type: 'basic', number: 7,
                title: { pt: 'DeFi (Finanças Descentralizadas)', en: 'DeFi (Decentralized Finance)' },
                subtitle: { pt: 'O futuro das finanças', en: 'The future of finance' },
                content: { pt: '<h3>O Que é DeFi?</h3><p>Finanças tradicionais, mas sem bancos. Podes emprestar, pedir emprestado, fazer yield farming.</p><p><strong>Exemplos:</strong> Uniswap (DEX), Aave (Lending), Curve (Stablecoins).</p><div class="callout success"><div class="callout-title">✓ Vantagem:</div><p>Yields altos (5-100% APY), sem intermediários, transparência total.</p></div><p><strong>Risco:</strong> Smart contracts podem ter bugs. Sempre auditados?</p>', en: '<h3>What is DeFi?</h3><p>Traditional finance, but without banks. You can lend, borrow, do yield farming.</p><p><strong>Examples:</strong> Uniswap (DEX), Aave (Lending), Curve (Stablecoins).</p><div class="callout success"><div class="callout-title">✓ Advantage:</div><p>High yields (5-100% APY), no intermediaries, total transparency.</p></div><p><strong>Risk:</strong> Smart contracts can have bugs. Always audited?</p>' }
            },
            {

                title: { pt: 'Fiscalidade em Portugal', en: 'Taxation in Portugal' },

                content: { pt: '<h3>Impostos em Crypto (PT)</h3><p><strong>1. Mais-Valia:</strong> Se compras a €100 e vendes a €200, ganhos €100. Imposto: 28% sobre os ganhos (€28).</p><p><strong>2. Airdrops:</strong> Considerados rendimento. Imposto quando recebes.</p><p><strong>3. Staking/Yield:</strong> Considerado rendimento. Imposto imediato.</p><p><strong>4. DCA/Holding:</strong> Sem imposto se não venderes.</p><div class="callout warning"><div class="callout-title">⚠ Importante:</div><p>Documenta TUDO. Guarda recibos de compra/venda. A AT está a revistar crypto.</p></div>', en: '<h3>Crypto Taxes (PT)</h3><p><strong>1. Capital Gains:</strong> If you buy at €100 and sell at €200, gain is €100. Tax: 28% on gains (€28).</p><p><strong>2. Airdrops:</strong> Considered income. Tax when received.</p><p><strong>3. Staking/Yield:</strong> Considered income. Immediate tax.</p><p><strong>4. DCA/Holding:</strong> No tax if you don\'t sell.</p><div class="callout warning"><div class="callout-title">⚠ Important:</div><p>Document EVERYTHING. Keep receipts of purchases/sales. Portuguese Tax Authority is auditing crypto.</p></div>' }

            {
                id: 'cap9', type: 'basic', number: 9,
                title: { pt: 'Estratégias de Investimento', en: 'Investment Strategies' },
                subtitle: { pt: 'Como investir', en: 'How to invest' },
                content: { pt: '<h3>4 Estratégias Principais</h3><p><strong>1. DCA (Dollar-Cost Averaging):</strong> Investe €100/mês regularmente. Reduz risco de timing.</p><p><strong>2. Lump Sum:</strong> Investe tudo de uma vez. Melhor se compras no fundo do mercado.</p><p><strong>3. 70/20/10:</strong> 70% em Bitcoin, 20% em Ethereum, 10% em altcoins.</p><p><strong>4. Hold & Compound:</strong> Compra e segura 4+ anos. Ciclos de mercado.</p><div class="callout success"><div class="callout-title">✓ Recomendação:</div><p>Para iniciantes: DCA. Investe €50-100/mês. Não penses no preço.</p></div>', en: '<h3>4 Main Strategies</h3><p><strong>1. DCA (Dollar-Cost Averaging):</strong> Invest €100/month regularly. Reduces timing risk.</p><p><strong>2. Lump Sum:</strong> Invest all at once. Better if you buy at market bottom.</p><p><strong>3. 70/20/10:</strong> 70% Bitcoin, 20% Ethereum, 10% altcoins.</p><p><strong>4. Hold & Compound:</strong> Buy and hold 4+ years. Market cycles.</p><div class="callout success"><div class="callout-title">✓ Recommendation:</div><p>For beginners: DCA. Invest €50-100/month. Don\'t think about price.</p></div>' }
            },
            {

                title: { pt: 'On-Chain Analytics', en: 'On-Chain Analytics' },
                subtitle: { pt: 'Dados reais da blockchain', en: 'Real blockchain data' },
                content: { pt: '<h3>3 Métricas Essenciais</h3><p><strong>1. Whale Movements:</strong> Se baleias (>100 BTC) movem fundos, é sinal importante.</p><p><strong>2. Exchange Flows:</strong> Saídas de exchanges = acumulação. Entradas = distribuição (venda).</p><p><strong>3. MVRV Ratio:</strong> Se >3, zona de lucro extremo. Se <1, zona de perda.</p><div class="example-box">Ferramenta: Glassnode, CryptoQuant, Nansen. Usa free tiers.</div>', en: '<h3>3 Essential Metrics</h3><p><strong>1. Whale Movements:</strong> If whales (>100 BTC) move funds, it\'s an important signal.</p><p><strong>2. Exchange Flows:</strong> Exchange withdrawals = accumulation. Inflows = distribution (selling).</p><p><strong>3. MVRV Ratio:</strong> If >3, extreme profit zone. If <1, loss zone.</p><div class="example-box">Tools: Glassnode, CryptoQuant, Nansen. Use free tiers.</div>' }

            {
                id: 'cap11', type: 'basic', number: 11,
                title: { pt: 'Psicologia do Trader', en: 'Trader Psychology' },
                subtitle: { pt: 'O factor humano', en: 'The human factor' },
                content: { pt: '<h3>5 Erros Psicológicos Comuns</h3><p><strong>1. FOMO (Fear of Missing Out):</strong> Compras altos porque vês outros a ganhar.</p><p><strong>2. Panic Selling:</strong> Vendes no pior momento porque tens medo.</p><p><strong>3. Confirmation Bias:</strong> Só vês informação que confirma tua opinião.</p><p><strong>4. Overconfidence:</strong> Depois de ganho, arrisca demais.</p><p><strong>5. Loss Aversion:</strong> Relutância em aceitar pequenas perdas (deixa virar grandes).</p><div class="callout warning"><div class="callout-title">⚠ Solução:</div><p>Faz planos ANTES de emocionar-te. Stop-loss e take-profit automáticos.</p></div>', en: '<h3>5 Common Psychological Errors</h3><p><strong>1. FOMO (Fear of Missing Out):</strong> You buy high because you see others winning.</p><p><strong>2. Panic Selling:</strong> You sell at the worst moment because you\'re scared.</p><p><strong>3. Confirmation Bias:</strong> You only see information that confirms your opinion.</p><p><strong>4. Overconfidence:</strong> After a win, you risk too much.</p><p><strong>5. Loss Aversion:</strong> Reluctance to accept small losses (lets them become big).</p><div class="callout warning"><div class="callout-title">⚠ Solution:</div><p>Make plans BEFORE emotions. Automatic stop-loss and take-profit.</p></div>' }
            },
            {
                id: 'cap12', type: 'basic', number: 12,
                title: { pt: 'Notícias e Eventos Macro', en: 'News and Macro Events' },
                subtitle: { pt: 'Que afeta o mercado', en: 'What affects the market' },
                content: { pt: '<h3>Eventos Que Movem Mercado</h3><p><strong>1. Decisões do Banco Central (FED):</strong> Taxa de juro sobe = crypto cai. Taxa desce = crypto sobe.</p><p><strong>2. Aprovações de ETFs:</strong> Bitcoin Spot ETF aprovado = grande volume e alta.</p><p><strong>3. Halvings:</strong> A cada 4 anos, recompensa de mining é reduzida. Historicamente = bull market.</p><p><strong>4. Regulação:</strong> Notícia de ban = crash. Notícia de regulação positiva = pump.</p><div class="callout success"><div class="callout-title">✓ Dica:</div><p>Segue calendário económico. CoinTelegraph, The Block, Cryptofees.</p></div>', en: '<h3>Events That Move the Market</h3><p><strong>1. Central Bank Decisions (FED):</strong> Interest rate up = crypto down. Rate down = crypto up.</p><p><strong>2. ETF Approvals:</strong> Bitcoin Spot ETF approved = big volume and pump.</p><p><strong>3. Halvings:</strong> Every 4 years, mining reward is halved. Historically = bull market.</p><p><strong>4. Regulation:</strong> Ban news = crash. Positive regulation news = pump.</p><div class="callout success"><div class="callout-title">✓ Tip:</div><p>Follow economic calendar. CoinTelegraph, The Block, Cryptofees.</p></div>' }
            },

            {
                id: 'adv1-smart-contracts', type: 'advanced', number: 14,
                title: { pt: 'Smart Contracts: O Código é Lei', en: 'Smart Contracts: Code is Law' },
                subtitle: { pt: 'Automatizar finanças', en: 'Automate finance' },
                content: { pt: '<h3>O Que é um Smart Contract?</h3><p>Um programa de computador que corre na blockchain. Quando condições são cumpridas, executa automaticamente.</p><p><strong>Exemplo:</strong> "Se o preço de Bitcoin atingir €50.000, venda automaticamente meus 0.5 BTC".</p><p><strong>Linguagem:</strong> Solidity (Ethereum), Rust (Solana).</p><div class="callout warning"><div class="callout-title">⚠ Risco:</div><p>Smart contracts podem ter bugs (vulnerabilidades). Sempre verifica se foi auditado.</p></div><p><strong>Ferramentas para começar:</strong> Remix IDE (web), Hardhat (local).</p>', en: '<h3>What is a Smart Contract?</h3><p>A computer program that runs on the blockchain. When conditions are met, it executes automatically.</p><p><strong>Example:</strong> "If Bitcoin price reaches €50,000, automatically sell my 0.5 BTC".</p><p><strong>Language:</strong> Solidity (Ethereum), Rust (Solana).</p><div class="callout warning"><div class="callout-title">⚠ Risk:</div><p>Smart contracts can have bugs (vulnerabilities). Always check if it was audited.</p></div><p><strong>Tools to start:</strong> Remix IDE (web), Hardhat (local).</p>' }
            },
            {
                id: 'adv2-yield-farming', type: 'advanced', number: 15,
                title: { pt: 'Yield Farming: Ganhar Passivamente', en: 'Yield Farming: Earn Passively' },
                subtitle: { pt: 'APY, APR, e riscos', en: 'APY, APR, and risks' },
                content: { pt: '<h3>Yield Farming 101</h3><p>Colocas teus tokens numa pool de liquidez. Receives fees + rewards. APY de 10-1000%!</p><p><strong>Tipos:</strong></p><p>1. <strong>Liquidity Mining:</strong> Provides liquidity (2 tokens em igual valor). Recebes % das trades.</p><p>2. <strong>Staking:</strong> Lockup teus tokens. Recebes rewards por validar rede.</p><p>3. <strong>Lending:</strong> Empresta tokens. Recebes juro (ex: Aave, Compound).</p><div class="callout warning"><div class="callout-title">⚠ Impermanent Loss:</div><p>Se preços divergem entre os 2 tokens, perdes dinheiro mesmo que APY seja alto.</p></div><p><strong>Exemplo real:</strong> Coloca €1000 (€500 BTC + €500 ETH). Se BTC sobe 50% e ETH fica igual, pode ter €950 (perda mesmo com APY).</p>', en: '<h3>Yield Farming 101</h3><p>You put your tokens in a liquidity pool. You receive fees + rewards. APY of 10-1000%!</p><p><strong>Types:</strong></p><p>1. <strong>Liquidity Mining:</strong> Provide liquidity (2 tokens in equal value). Receive % of trades.</p><p>2. <strong>Staking:</strong> Lock your tokens. Receive rewards for validating network.</p><p>3. <strong>Lending:</strong> Lend tokens. Receive interest (e.g., Aave, Compound).</p><div class="callout warning"><div class="callout-title">⚠ Impermanent Loss:</div><p>If prices diverge between the 2 tokens, you lose money even if APY is high.</p></div><p><strong>Real example:</strong> Put €1000 (€500 BTC + €500 ETH). If BTC rises 50% and ETH stays same, might have €950 (loss even with APY).</p>' }

            {
                id: 'adv3-nfts', type: 'advanced', number: 16,
                title: { pt: 'NFTs: Ativos Digitais Únicos', en: 'NFTs: Unique Digital Assets' },
                subtitle: { pt: 'O hype e a realidade', en: 'The hype and reality' },
                content: { pt: '<h3>O Que é um NFT?</h3><p>Um token não-fungível. Cada um é único (diferente do Bitcoin, que são todos iguais).</p><p><strong>Casos de Uso Real:</strong></p><p>1. <strong>Arte Digital:</strong> Artistas ganham royalties cada vez que NFT é vendido (5-10%).</p><p>2. <strong>Gaming:</strong> Propriedade real de items (não perdes se jogo fecha).</p><p>3. <strong>Memberships:</strong> Acesso a comunidades, eventos, conteúdo exclusivo.</p><div class="callout warning"><div class="callout-title">⚠ Aviso:</div><p>99% dos NFTs são scams ou projectos mortos. Se vires "NFT collection" que promete 10000% gains, é 100% scam.</p></div><p><strong>Ferramentas:</strong> OpenSea (marketplace), Blur (profissional).</p>', en: '<h3>What is an NFT?</h3><p>A non-fungible token. Each one is unique (unlike Bitcoin, which are all the same).</p><p><strong>Real Use Cases:</strong></p><p>1. <strong>Digital Art:</strong> Artists earn royalties every time NFT is sold (5-10%).</p><p>2. <strong>Gaming:</strong> Real ownership of items (you don\'t lose if game closes).</p><p>3. <strong>Memberships:</strong> Access to communities, events, exclusive content.</p><div class="callout warning"><div class="callout-title">⚠ Warning:</div><p>99% of NFTs are scams or dead projects. If you see "NFT collection" promising 10000% gains, it\'s 100% scam.</p></div><p><strong>Tools:</strong> OpenSea (marketplace), Blur (professional).</p>' }
            },
            {
                id: 'adv4-airdrops', type: 'advanced', number: 17,
                title: { pt: 'Guia Completo de Airdrops', en: 'Complete Airdrop Guide' },
                subtitle: { pt: 'Como ganhar tokens grátis', en: 'How to earn free tokens' },
                content: { pt: '<h3>O Que é um Airdrop?</h3><p>Uma distribuição gratuita de tokens de criptomoeda a utilizadores que cumprem certos critérios. Não é um presente aleatório — é uma estratégia de marketing que projectos usam para distribuir tokens inicialmente, recompensar early adopters, gerar buzz e aumentar uso.</p><p><strong>Tipos de Airdrops:</strong></p><p><strong>1. Airdrop Simples:</strong> Qualquer um que tenha uma wallet recebe tokens.</p><p><strong>2. Airdrop Condicional:</strong> Precisas cumprir tarefas (fazer follow, retweet, usar protocolo).</p><p><strong>3. Airdrop Snapshot:</strong> Tiram "foto" de quem tem tokens numa data específica.</p><p><strong>4. Airdrop com Holding:</strong> Precisas manter tokens bloqueados por período.</p><p><strong>Casos de Sucesso Reais:</strong></p><p><strong>Uniswap (2020):</strong> Airdrop de 400 tokens. Hoje valem €1000+. Quem recebeu e vendeu faz 150.000% de ganho.</p><p><strong>Arbitrum (2023):</strong> Airdrop de 4075 tokens. Hoje valem €3000+. Ganho: 300.000%.</p><p><strong>Como Participar (Passo a Passo):</strong></p><p><strong>Passo 1: Identifica Airdrops Legítimos</strong></p><p>Não cliques em links aleatórios. Verifica:</p><ul><li>Site oficial do projecto (não links de redes sociais)</li><li>Twitter/X verificado (badge azul ✓)</li><li>Comunidade no Discord com membros ativos</li><li>Whitepaper ou documentação séria</li></ul><div class="callout warning"><div class="callout-title">⚠ Aviso: Scams</div><p>"Conecta a tua wallet e ganha 1000 tokens grátis!" — Fake. Ninguém pede acesso à tua wallet para te dar algo. Se pedem, é scam 100%.</p></div><p><strong>Passo 2: Prepara a Tua Wallet</strong></p><p>Cria uma wallet separada para airdrops (não a principal com muitos fundos). Usa:</p><ul><li>MetaMask (Ethereum, Polygon, etc)</li><li>Trust Wallet (multi-chain)</li><li>Ledger (hardware wallet — mais seguro)</li></ul><p><strong>Passo 3: Cumpre os Requisitos</strong></p><p>Se pede para fazer follow, retweet, usar protocolo — faz. Cada projecto tem critérios diferentes.</p><div class="example-box">Exemplo de requisitos típicos:<br>- Ter wallet criada há mais de 1 mês<br>- Ter saldo mínimo (ex: €10 em cripto)<br>- Fazer 1+ transação no protocolo<br>- Follow no Twitter<br>- Membro ativo do Discord</div><p><strong>Passo 4: Aguarda a Distribuição</strong></p><p>Airdrops são distribuídos em "waves" (ondas). Pode levar semanas ou meses. Alguns projectos anunciam data, outros surpreendem.</p><p><strong>Passo 5: Recebe os Tokens</strong></p><p>Tokens aparecem na tua wallet automaticamente. Não precisas fazer nada — apenas aparecem.</p><p><strong>Por Que São Bons? (5 Razões)</strong></p><p><strong>1. Dinheiro Grátis:</strong> Ganhas tokens sem investir (se fores early).</p><p><strong>2. Baixo Risco:</strong> Não investes capital inicial.</p><p><strong>3. Descobrir Projectos Novos:</strong> Conheces tecnologia inovadora cedo.</p><p><strong>4. Potencial de 100x-1000x:</strong> Se o projecto cresce, tokens valem muito mais.</p><p><strong>5. Educação:</strong> Aprendes como protocolos funcionam participando.</p><p><strong>Riscos e Como Evitá-los</strong></p><p><strong>Risco 1: Scams/Phishing</strong></p><ul><li>❌ Site fake que pede a tua seed phrase</li><li>❌ Smart contract maligno que rouba tokens</li><li>✅ Usa sempre sites oficiais (verifica URL)</li><li>✅ Nunca conectes a wallet em sites desconhecidos</li></ul><p><strong>Risco 2: Esperança Falsa</strong></p><ul><li>❌ Nem todos os airdrops valem algo no futuro</li><li>✅ Pesquisa o projecto antes (whitepaper, team, roadmap)</li></ul><p><strong>Risco 3: Impostos</strong></p><ul><li>Airdrops em Portugal são considerados "rendimento" — tens de pagar IRS</li><li>Se venderes depois (mais-valia) pagas novamente IRS</li><li>✅ Documenta tudo para o imposto</li></ul><p><strong>Risco 4: Timing do Mercado</strong></p><ul><li>❌ Tokens podem cair 90% após airdrop (distribuição em massa = venda)</li><li>✅ Não vendas no pico — aguarda estabilização</li></ul><p><strong>Checklist Antes de Participar</strong></p><div class="example-box">☐ Projecto tem website oficial?<br>☐ Twitter/X está verificado?<br>☐ Whitepaper ou roadmap claro?<br>☐ Discord/Telegram com comunidade ativa?<br>☐ Equipa com histórico (fundadores conhecidos)?<br>☐ Não pede a seed phrase?<br>☐ Não pede dinheiro para participar?<br>☐ Wallet segura preparada?<br>☐ Documentei para imposto (PT)?</div><p><strong>Estratégia Avançada: Farming Airdrops</strong></p><p>Alguns investidores "farm" airdrops — participam em múltiplos projectos ao mesmo tempo para maximizar ganhos.</p><p><strong>Como?</strong></p><ol><li>Identifica 10-20 projectos em fase de airdrop</li><li>Cumpre requisitos de cada um (baixo esforço)</li><li>Espera distribuição (pode levar meses)</li><li>Se X% deles valem algo, ganhas</li></ol><div class="callout"><div class="callout-title">Exemplo Real</div><p>Participas em 10 airdrops. Cada um dá ~€50 em tokens. Se vários crescem, tens €500-5000 ganhos. Investimento: 2-3h de tempo, 0€.</p></div><p><strong>Recursos Úteis</strong></p><ul><li><strong>Airdrop.io:</strong> Calendário de airdrops</li><li><strong>DefiLlama:</strong> Projectos DeFi com airdrops</li><li><strong>Twitter #airdrop:</strong> Anúncios em tempo real</li><li><strong>Discord de Projectos:</strong> Oficial, verificado</li></ul>', en: '<h3>What is an Airdrop?</h3><p>A free distribution of cryptocurrency tokens to users who meet certain criteria. It\'s not a random gift — it\'s a marketing strategy projects use to distribute tokens, reward early adopters, generate buzz, and increase usage.</p><p><strong>Types of Airdrops:</strong></p><p><strong>1. Simple Airdrop:</strong> Anyone with a wallet receives tokens.</p><p><strong>2. Conditional Airdrop:</strong> You must complete tasks (follow, retweet, use protocol).</p><p><strong>3. Snapshot Airdrop:</strong> They take a "photo" of who holds tokens on a specific date.</p><p><strong>4. Holding Airdrop:</strong> You must keep token isk:</strong> No initial capital required.</p><p><strong>3. Discover New Projects:</strong> Learn about innovative technology early.</p><p><strong>4. Huge Upside Potential:</strong> 100x-1000x gains if project grows.</p><p><strong>5. Education:</strong> Learn how protocols work by participating.</p><p><strong>Risks and How to Avoid Them</strong></p><p><strong>Risk 1: Scams/Phishing</strong></p><ul><li>❌ Fake website asking for seed phrase</li><li>❌ Malicious smart contract stealing tokens</li><li>✅ Always use official sites (check URL)</li><li>✅ Never connect wallet on unknown sites</li></ul><p><strong>Risk 2: False Hope</strong></p><ul><li>❌ Not all airdrops become valuable</li><li>✅ Research project first (whitepaper, team, roadmap)</li></ul><p><strong>Risk 3: Taxes</strong></p><ul><li>Airdrops are taxable income in most countries</li><li>If you sell later (capital gains) you pay again</li><li>✅ Document everything for taxes</li></ul><p><strong>Risk 4: Market Timing</strong></p><ul><li>❌ Tokens can fall 90% after a        body.dark-mode .hamburger span { background-color: var(--color-text-dark); }

                subtitle: { pt: 'A história que precedeu Bitcoin', en: 'The history that preceded Bitcoin' },
                content: { pt: `
                    <h3>A Crise de 2008 e o Colapso</h3>
                    <p>Em setembro de 2008, Lehman Brothers colapsou. O sistema financeiro global entrou em pânico. Bancos desabaram. Poupanças evaporaram. Milhões perderam casas e empregos. Ninguém o vira vindo. Os "especialistas" não tinham ideia. Os mecanismos de segurança falharam completamente.</p>
                    <div class="callout warning">
                        <div class="callout-title">Por que importa?</div>
                        <p>Esta crise destruiu a confiança no sistema centralizado. Se as instituições que deveriam proteger o nosso dinheiro são as mesmas que o perdem, para que servem?</p>
                    </div>
                    <h3>Satoshi Nakamoto e a Visão Alternativa</h3>
                    <p>Em 31 de outubro de 2008, Satoshi Nakamoto publicou um documento de nove páginas: "Bitcoin: A Peer-to-Peer Electronic Cash System". O documento propunha algo radical: dinheiro digital que não precisaria de bancos, de intermediários, de ninguém que controlasse o sistema. Apenas código, criptografia e matemática.</p>
                    <div class="example-box">Abstract: "A purely peer-to-peer version of electronic cash would allow online payments to be sent directly from one party to another without going through a financial institution."</div>
                    <h3>O Genesis Block — Janeiro de 2009</h3>
                    <p>A 3 de janeiro de 2009, o software Bitcoin foi ativado. A primeira transação (chamada de "Genesis Block") foi minerada. Nesse bloco, Satoshi incluiu uma mensagem:</p>
                    <div class="example-box">"The Times 03/Jan/2009 Chancellor on brink of second bailout for banks"</div>
                    <p>Uma referência direta ao jornal The Times de 3 de janeiro de 2009. Uma mensagem clara: o sistema precisava mudar.</p>
                    <h3>Os Pilares da Revolução</h3>
                    <p>Bitcoin foi construído sobre três pilares fundamentais:</p>
                    <ul>
                        <li><strong>Descentralização:</strong> Sem um servidor central. Milhares de nós. Cada um com cópia completa da história.</li>
                        <li><strong>Transparência:</strong> Todas as transações são visíveis. Ninguém pode falsificar registos. Tudo é verificável.</li>
                        <li><strong>Sem Permissão:</strong> Qualquer pessoa, em qualquer lugar, a qualquer hora, pode participar. Não precisa de aprovação.</li>
                    </ul>
                    <div class="callout">
                        <div class="callout-title">Nota Importante</div>
                        <p>Bitcoin não foi a primeira tentativa de moeda digital. Houve várias antes. O que a torna diferente é que resolveu o "double-spending problem" — garantir que a mesma moeda digital não é gasta duas vezes — sem precisar de um intermediário.</p>
                    </div>
                    <h3>Do Genesis ao Hoje</h3>
                    <p>Desde 2009, o Bitcoin subiu de centavos para milhares de euros. Passou de um experimento técnico para uma classe de ativos de trilhões de dólares.</p>

                    <h3>O Teu Genesis</h3>
                    <p>Aqui estás tu, 15+ anos depois. Estás a explorar um ecossistema que foi nascido da desconfiança no sistema tradicional. Este capítulo é o teu Genesis Block. O teu ponto de partida. De agora em diante, construímos conhecimento sobre fundações sólidas.</p>
                `, en: `
                    <h3>The 2008 Crisis</h3>

                    </div>
                    <h3>Satoshi Nakamoto and the Alternative Vision</h3>
                    <p>On October 31, 2008, Satoshi Nakamoto published a nine-page document: "Bitcoin: A Peer-to-Peer Electronic Cash System".</p>
                    <p>The document proposed something radical: digital money that would not need banks, intermediaries, or anyone controlling the system. Just code, cryptography and mathematics.</p>

                title: { pt: 'Blockchain, Mineração e Consenso', en: 'Blockchain, Mining and Consensus' },
                subtitle: { pt: 'Como funciona a tecnologia', en: 'How the technology works' },
                content: { pt: `
                    <h3>O que é a Blockchain?</h3>
                    <p>Blockchain é, em essência, uma lista de blocos. Cada bloco contém dados (transações) e uma referência criptográfica (um hash) para o bloco anterior. É como uma corrente de blocos conectados.</p>
                    <div class="example-box">Bloco 1: [Dados] → Hash ABC123<br>Bloco 2: [Dados] + Hash ABC123 → Hash DEF456<br>Bloco 3: [Dados] + Hash DEF456 → Hash GHI789</div>
                    <h3>As Quatro Propriedades Essenciais</h3>
                    <ul>
                        <li><strong>Imutabilidade:</strong> Se alguém tenta mudar um dado no Bloco 2, o seu hash muda. Mas o Bloco 3 ainda referencia o hash anterior. A mudança é imediatamente detetada. Qualquer alteração passada quebra a corrente inteira.</li>
                        <li><strong>Descentralização:</strong> Não há um único servidor. Há milhares. Cada um tem uma cópia completa. Para alterar a história, terias de alterar a maioria simultaneamente — praticamente impossível.</li>
                        <li><strong>Transparência:</strong> Qualquer um pode ver toda a história da blockchain. Todas as transações estão lá. Não há segredos técnicos, apenas criptografia pública.</li>
                        <li><strong>Sem Permissão:</strong> Qualquer um pode juntar-se à rede e começar a validar transações. Não precisa de pedir permissão a ninguém.</li>
                    </ul>
                    <div class="callout">
                        <div class="callout-title">Analogia do Mundo Real</div>
                        <p>Imagina um caderno que é partilhado por 10.000 pessoas. Qualquer transação é anotada no caderno e distribuída a todas. Se uma pessoa tenta falsificar uma transação anterior, as outras 9.999 dizem "não, isso não corresponde ao nosso registo". É impossível falsificar.</p>
                    </div>
                    <h3>Mineração — Como Novos Blocos são Criados</h3>
                    <p>A mineração é o processo de validação e adição de novos blocos à blockchain. Quando alguém faz uma transação Bitcoin, ela entra num "mempool" — uma fila de transações à espera de validação. Os mineradores competem para resolver um quebra-cabeça matemático complexo. O primeiro a resolvê-lo ganha o direito de adicionar o novo bloco (com as transações) à blockchain.</p>
                    <p>Esse minerador recebe uma recompensa: uma quantidade de Bitcoin novo ("block reward") + as taxas das transações que incluiu.</p>
                    <div class="example-box">Exemplo: 10 transações aguardam validação. 5 mineradores estão a competir. Minerador A resolve o puzzle primeiro. Block reward: 6.25 BTC (em 2024). Taxas: 0.05 BTC. Total ganho: 6.30 BTC.</div>
                    <h3>Prova de Trabalho (PoW) vs Prova de Participação (PoS)</h3>
                    <p><strong>Prova de Trabalho (PoW):</strong> Como Bitcoin. Mineradores usam potência computacional massiva para resolver puzzles. É seguro mas consome muita energia.</p>
                    <p><strong>Prova de Participação (PoS):</strong> Novo modelo. Em vez de computação, os validadores "apostam" moedas próprias. Se forem honestos, ganham recompensa. Se tentarem fraudar, perdem as moedas ("slashing"). Ethereum mudou para PoS em 2022.</p>
                    <h3>Smart Contracts</h3>
                    <p>Bitcoin pode apenas registar transações. Ethereum (2015) adicionou "smart contracts" — programas que vivem na blockchain e executam automaticamente quando certas condições são cumpridas.</p>
                    <p>Exemplo: "Se o preço da BTC subir acima de €50.000, transfere 1 ETH da carteira A para a carteira B".</p>
                    <p>Os smart contracts são "imutáveis" — uma vez publicados, não podem ser alterados ou cancelados. Executam-se exatamente como foram programados.</p>

                content: { pt: `
                    <h3>O que é uma Wallet?</h3>
                    <p>Uma wallet é simplesmente um par de chaves criptográficas: uma pública (como um IBAN) e uma privada (como a password do teu banco, mas muito mais crítica).</p>
                    <p><strong>Chave Pública:</strong> Pode ser partilhada livremente. Qualquer um pode enviar-te moedas usando a tua chave pública.</p>
                    <p><strong>Chave Privada:</strong> NUNCA a partilhes. Quem tem a chave privada controla os fundos. Se a perdes, perdes o acesso às moedas para sempre.</p>
                    <div class="callout danger">
                        <div class="callout-title">Regra Absoluta #1: Guarda a Chave Privada</div>
                        <p>Se alguém tem a tua chave privada, pode enviar todas as tuas moedas para qualquer lugar e tu não podes fazer nada. Não há "guardarroupa", não há "esqueci a password". Desaparece.</p>
                    </div>
                    <h3>Tipos de Wallets</h3>
                    <p><strong>Custodial (Centralizado):</strong> Uma exchange (como Kraken, Binance) guarda a tua moeda e a chave privada. Tu tens um login/password, mas a exchange controla tecnicamente os fundos. Se a exchange é hackeada ou falha, podes perder tudo.</p>
                    <p><strong>Non-Custodial (Descentralizado):</strong> Tu guardas a chave privada. Tu és o banco. Exemplos: hardware wallets (Ledger, Trezor), software wallets (MetaMask), paper wallets.</p>
                    <div class="example-box">Exemplo de Seed Phrase (12 palavras): "abandon ability able about above absent absorb abstract abstain accent accept access". Esta frase gera todas as chaves da tua wallet. NUNCA a parta com ninguém.</div>
                    <h3>A Seed Phrase — A Tua Chave Mestra</h3>
                    <p>A maioria das wallets modernas usam uma "seed phrase" — uma sequência de 12 ou 24 palavras que geram todas as chaves privadas. Se conseguires a seed phrase, consegues a wallet inteira.</p>
                    <p>Se perdes a seed phrase e o teu dispositivo é roubado/destruído, perdeste acesso aos fundos permanentemente.</p>
                    <h3>Exchanges — Os Portais de Entrada</h3>
                    <p>Uma exchange é uma plataforma onde podes comprar, vender e trocar moedas. Exemplos: Kraken, Binance, Coinbase. Vantagem: Fácil de usar, interface simples, podes usar cartão de crédito. Desvantagem: A exchange é custodial — eles guardam as chaves.</p>
                    <h3>A Importância de Retirar da Exchange</h3>

                        <li><strong>Confiança Falsa:</strong> "Influenciador" oferece giveaway. Se enviares €100 primeiro, recebes €1000 em BTC. Obviamente, é scam.</li>
                    </ul>
                `, en: `

                    <p>A wallet is simply a pair of cryptographic keys: one public (like an IBAN) and one private (like your bank password, but much more critical).</p>

                    <h3>Indicadores Técnicos Essenciais</h3>
                    <p><strong>RSI (Relative Strength Index):</strong> Mede a força do movimento. Entre 0 e 100. Acima de 70 = "sobrecomprado" (pode cair). Abaixo de 30 = "sobrevendido" (pode subir).</p>
                    <p><strong>MACD (Moving Average Convergence Divergence):</strong> Mostra momentum. Quando a linha rápida cruza a linha lenta = mudança de direção possível.</p>
                    <p><strong>Médias Móveis:</strong> Média do preço dos últimos X dias. Suaviza a volatilidade. Se o preço está acima da média móvel de 200 dias = tendência de alta.</p>
                    <p><strong>Volume:</strong> Quantas moedas foram transacionadas. Volume alto = movimento forte (confirmado). Volume baixo = movimento fraco (falso).</p>
                    <div class="callout">
                        <div class="callout-title">Nota Sobre Indicadores</div>
                        <p>Indicadores são "lagging" — dizem-te o que já aconteceu, não o que vai acontecer. Não são cristais. São ferramentas de contexto.</p>
                    </div>
                    <h3>Ciclos de Mercado</h3>
                    <p>O mercado crypto é cíclico. Segue um padrão:</p>
                    <ol>
                        <li><strong>Acumulação:</strong> Preço baixo, interesse baixo. Pessoas conscientes entram silenciosamente.</li>
                        <li><strong>Markup:</strong> Preço sobe. Mais pessoas percebem e entram.</li>
                        <li><strong>Distribuição:</strong> Preço alcança picos. Ganancioso. Todos falam sobre crypto. Influenciadores fazem "calls". Pessoas entram no topo.</li>
                        <li><strong>Markdown:</strong> Preço cai brutalmente. Pânico. Pessoas vendem tudo. Saem frustradas.</li>
                        <li>Volta ao passo 1.</li>
                    </ol>
                    <p>Bitcoin tem "halving" a cada 4 anos. Isto tende a criar ciclos de ~4 anos também.</p>
                    <h3>Eventos Macro Que Afetam Crypto</h3>
                    <p><strong>Taxas de Juro:</strong> Se o Banco Central aumenta taxas, menos pessoas especulam em crypto. Se baixa, mais especulação.</p>
                    <p><strong>Inflação:</strong> Alta inflação torna crypto apelativo (ouro digital). Mas também torna tudo volátil.</p>
                    <p><strong>Notícias Regulatórias:</strong> Se um país bane crypto, preço cai. Se outro o aceita, sobe.</p>
                    <p><strong>Adoção Institucional:</strong> Quando grandes fundos entram, mercado sobe.</p>
                `, en: `

        const monthly = parseFloat(document.getElementById('dca-monthly').value) || 100;
        const years = parseInt(document.getElementById('dca-years').value) || 5;
        const rate = parseFloat(document.getElementById('dca-rate').value) / 100 / 12 || 0.15 / 12;

        let value = 0;
        const data = { labels: [], values: [] };

        for (let i = 0; i < years * 12; i++) {
            value = (value + monthly) * (1 + rate);
            if (i % 3 === 0) {
                data.labels.push(`Mês ${i}`);
                data.values.push(Math.round(value));
            }
        }

        const invested = monthly * years * 12;
        document.getElementById('dca-invested').textContent = '€' + invested.toFixed(2);
        document.getElementById('dca-value').textContent = '€' + Math.round(value).toFixed(2);
        document.getElementById('dca-profit').textContent = '€' + (value - invested).toFixed(2);
        document.getElementById('dca-results').style.display = 'block';

        // Desenhar gráfico
        const ctx = document.getElementById('dca-chart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.labels,
                datasets: [{
                    label: 'DCA Growth',
                    data: data.values,
                    borderColor: '#1565C0',
                    backgroundColor: 'rgba(21, 101, 192, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { callback: v => '€' + v }
                    }
                }
            }
        });
    }

    function runTaxCalculator() {
        const buy = parseFloat(document.getElementById('tax-buy').value) || 10000;
        const sell = parseFloat(document.getElementById('tax-sell').value) || 15000;
        const days = parseInt(document.getElementById('tax-days').value) || 200;
        const rate = parseFloat(document.getElementById('tax-rate').value) / 100 || 0.285;

        const gain = sell - buy;
        const isExempt = days >= 365;
        const irs = isExempt ? 0 : gain * rate;
        const net = sell - irs;

        document.getElementById('tax-gain').textContent = '€' + gain.toFixed(2);
        document.getElementById('tax-irs').textContent = '€' + irs.toFixed(2) + (isExempt ? ' (isento)' : '');
        document.getElementById('tax-net').textContent = '€' + net.toFixed(2);
        document.getElementById('tax-results').style.display = 'block';
    }

    function compareAssets() {
        const asset1 = document.getElementById('asset1').value;
        const asset2 = document.getElementById('asset2').value;

        const assetData = {
            'BTC': { price: '€42,500', vol: 'Baixa', risk: 'Médio' },
            'ETH': { price: '€2,200', vol: 'Média', risk: 'Médio-Alto' },
            'SOL': { price: '€145', vol: 'Alta', risk: 'Alto' },
            'ADA': { price: '€1.50', vol: 'Alta', risk: 'Muito Alto' },
            'XRP': { price: '€0.95', vol: 'Média', risk: 'Alto' }
        };

        document.getElementById('comp-asset1').textContent = asset1;
        document.getElementById('comp-asset2').textContent = asset2;
        document.getElementById('comp-price1').textContent = assetData[asset1]?.price || '-';
        document.getElementById('comp-price2').textContent = assetData[asset2]?.price || '-';
        document.getElementById('comp-vol1').textContent = assetData[asset1]?.vol || '-';
        document.getElementById('comp-vol2').textContent = assetData[asset2]?.vol || '-';
        document.getElementById('comp-risk1').textContent = assetData[asset1]?.risk || '-';
        document.getElementById('comp-risk2').textContent = assetData[asset2]?.risk || '-';
        document.getElementById('comparison-results').style.display = 'block';
    }

    // Validar código
    document.querySelector('.code-submit').addEventListener('click', function() {
        const code = document.getElementById('vault-code').value.toUpperCase();
        const errorDiv = document.getElementById('code-error');

        if (VAULT_CODES.includes(code)) {
            sessionStorage.setItem('vault-auth', 'true');
            isAuthenticated = true;
            document.getElementById('gate').style.display = 'none';
            document.getElementById('course-content').style.display = 'block';
            renderSidebar();
            loadChapter('cap1');
            errorDiv.classList.remove('show');
        } else {
            errorDiv.textContent = 'Código inválido. Tenta novamente.';
            errorDiv.classList.add('show');
        }
    });

    // Tema
    document.querySelector('.theme-toggle').addEventListener('click', function() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('genesis-theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        this.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    });

    // Idioma
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            currentLanguage = this.dataset.lang;
            localStorage.setItem('genesis-language', currentLanguage);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            if (currentChapterIndex > 0) {
                loadChapter(chapters[currentChapterIndex].id);
            }
        });
    });

    // Carregar tema e idioma salvos
    if (localStorage.getItem('genesis-theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.querySelector('.theme-toggle').textContent = '☀️';
    }

    // Verificar autenticação ao carregar
    if (isAuthenticated) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('course-content').style.display = 'block';
        renderSidebar();
        loadChapter('cap1');
    }
</script>
